version: '3.8'

services:
  cold-relay:
    build: .
    image: cold-relay:latest
    container_name: cold-relay
    volumes:
      # Mount local data directory for input/output
      - ./data:/data
      # Mount results directory
      - ./results:/home/sleuth/results
    working_dir: /home/sleuth
    # Override default CMD to keep container running
    entrypoint: ["tail", "-f", "/dev/null"]
    restart: unless-stopped
    
  # Development container with shell access
  cold-relay-dev:
    build: .
    image: cold-relay:latest
    container_name: cold-relay-dev
    volumes:
      - ./data:/data
      - ./results:/home/sleuth/results
      - .:/home/sleuth/src:ro
    working_dir: /home/sleuth
    entrypoint: ["/bin/sh"]
    stdin_open: true
    tty: true
    profiles:
      - dev
